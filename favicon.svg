<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0d1117"/>

  <!-- Flask silhouette (faint fill) -->
  <path d="M13 3h6v9l7 12c1.5 2.5-.5 5-3 5H9c-2.5 0-4.5-2.5-3-5l7-12V3z"
        fill="#58a6ff" opacity="0.15"/>

  <!-- Liquid inside (bottom portion, clipped to flask shape) -->
  <clipPath id="f">
    <path d="M13 3h6v9l7 12c1.5 2.5-.5 5-3 5H9c-2.5 0-4.5-2.5-3-5l7-12V3z"/>
  </clipPath>
  <rect x="0" y="20" width="32" height="12" fill="#58a6ff" opacity="0.75" clip-path="url(#f)"/>

  <!-- Flask outline -->
  <path d="M13 3h6v9l7 12c1.5 2.5-.5 5-3 5H9c-2.5 0-4.5-2.5-3-5l7-12V3z"
        fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Rim at top of neck -->
  <rect x="11" y="2" width="10" height="2" rx="1" fill="#58a6ff"/>

  <!-- Bubbles escaping out (the "escaped" bit) -->
  <circle cx="23" cy="3" r="2" fill="#58a6ff"/>
  <circle cx="27" cy="7" r="1.3" fill="#58a6ff" opacity="0.6"/>
</svg>
