<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Logger</title>
    <link rel="stylesheet" href="task-logger.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <div class="header-row">
          <div>
            <h1>Task Logger</h1>
            <p class="subtitle">Track your daily routine</p>
          </div>
          <button type="button" id="settings-btn" class="btn-settings" title="Manage tasks" aria-label="Manage tasks" aria-expanded="false">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </header>

      <section id="log-section">
        <h2>Today <span id="today-date"></span></h2>
        <div id="task-list" class="task-list"></div>
        <p id="empty-state" class="empty-state">No tasks yet. Add one below.</p>
      </section>

      <section id="add-section" hidden>
        <h2>Manage Tasks</h2>
        <form id="add-form">
          <input type="text" id="task-name" placeholder="Task name, e.g. Shoulder stretches" required />
          <select id="task-freq">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="weekdays">Weekdays</option>
            <option value="weekends">Weekends</option>
          </select>
          <button type="submit" class="btn btn-add">Add Task</button>
        </form>
      </section>

      <section id="history-section">
        <h2>History</h2>
        <div id="cal-nav">
          <button type="button" id="prev-month" class="btn btn-nav">&larr;</button>
          <span id="cal-month-label"></span>
          <button type="button" id="next-month" class="btn btn-nav">&rarr;</button>
        </div>
        <div id="calendar" class="calendar"></div>
        <div id="day-detail">
          <h3 id="detail-date">Today</h3>
          <div id="history-list" class="task-list"></div>
          <p id="history-empty" class="empty-state">No logs for this day.</p>
        </div>
      </section>
    </div>
    <script src="task-logger.js"></script>
  </body>
</html>
