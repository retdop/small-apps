name: CI

on:
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Build mots-fléchés
        working-directory: mots-fleches-source-app
        run: |
          pnpm install --frozen-lockfile
          npx vite build

      - name: Build task-logger
        working-directory: task-logger-source
        run: |
          pnpm install --frozen-lockfile
          npx vite build

  validate-html:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate HTML
        run: |
          npx html-validate --ext html index.html projects/*.html
